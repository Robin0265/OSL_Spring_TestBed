[workspace]
authors = ["Yuanshao Yang <yyang3051@gatech.edu>"]
channels = ["conda-forge"]
name = "OSL_Spring_TestBed"
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]
version = "0.1.0"

[tasks]
py = { cmd = "python -s", env = { PYTHONNOUSERSITE = "1" } }
python-safe = { cmd = "python -s", env = { PYTHONNOUSERSITE = "1" } }

[dependencies]
python = "3.12.*"

[pypi-dependencies]
adafruit-blinka = ">=9.1.0"
adafruit-circuitpython-ads1x15 = ">=3.0.4"
board = ">=1.0"
matplotlib = ">=3.11.0"
numpy = ">=1.25.0, <2"
opencv-python = ">=4.11.0.86, <4.12.0"
opensourceleg = { version = "==3.5.0", extras = ["dephy"] }
scipy = ">=1.17.1"
smbus2 = ">=0.6.1"
